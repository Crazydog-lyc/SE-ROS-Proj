# TODO[苏易]： 参数调优与场景配置
safety_monitor:
  ros__parameters:
    use_sim_time: True
    scan_topic: /scan
    odom_topic: /odom
    cmd_vel_topic: /cmd_vel
    base_frame: base_link
    odom_frame: odom
    enable_sensor_monitor: True
    enable_tf_monitor: True
    enable_blockage_monitor: True
    enable_obstacle_monitor: False
    startup_grace_period_sec: 20.0
    tf_startup_grace_period_sec: 15.0
    tf_require_initial_transform: True
    sensor_timeout_sec: 10.0
    tf_timeout_sec: 10.0
    obstacle_pause_distance: 0.45
    obstacle_monitor_fov_deg: 60.0
    obstacle_monitor_requires_motion: True
    obstacle_monitor_motion_grace_sec: 1.0
    blockage_window_sec: 6.0
    min_progress_distance: 0.05
    min_cmd_vel_linear: 0.05
    min_cmd_vel_angular: 0.1
    auto_cancel_after_recovery_failures: 2
    recovery_grace_period_sec: 3.0
    monitor_period_sec: 0.2
    zero_cmd_publish_period_sec: 0.1
    recovery_clear_costmaps: True
