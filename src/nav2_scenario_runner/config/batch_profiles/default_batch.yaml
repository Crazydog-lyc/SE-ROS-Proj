cases:
  - case_id: corridor_seed_001
    scenario_type: corridor
    seed: 1
    waypoint_count: 5
    enable_semantic_regions: true

  - case_id: room_inspection_seed_002
    scenario_type: room_inspection
    seed: 2
    waypoint_count: 6
    enable_semantic_regions: true

  - case_id: congestion_seed_003
