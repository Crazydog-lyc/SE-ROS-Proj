# Two-round demo batch profile for nav2_scenario_runner
batch_settings:
  timeout_sec: 900
  auto_start_delay_sec: 10
  nav2_startup_delay_sec: 10
  nav2_ready_timeout_sec: 420
  run_headless: false
  enable_safety: true
 

cases:
  - case_id: pillar_round_001
    scenario_type: corridor
    seed: 17
    waypoint_count: 2
    enable_semantic_regions: true
    enable_congestion: true
    world_file: demo_pillar_room.sdf
    mission_waypoints:
      - {x: 1.20, y: -1.65, yaw: 0.0}
      - {x: 2.75, y: 0.68, yaw: 0.0}

  - case_id: simple_round_002
    scenario_type: corridor
    seed: 2
    waypoint_count: 1
    enable_semantic_regions: true
    world_file: demo_simple_room.sdf
    mission_waypoints:
      - {x: 1.00, y: -1.65, yaw: 0.0}
