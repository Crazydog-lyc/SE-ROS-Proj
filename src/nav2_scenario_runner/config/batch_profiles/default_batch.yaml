# Two-round demo batch profile for nav2_scenario_runner
batch_settings:
  timeout_sec: 900
  auto_start_delay_sec: 75
  nav2_startup_delay_sec: 50
  nav2_ready_timeout_sec: 420
  run_headless: true
  enable_safety: true
  world_file: demo_pillar_room.sdf

cases:
  - case_id: pillar_round_001
    scenario_type: corridor
    seed: 1
    waypoint_count: 2
    enable_semantic_regions: true
    mission_waypoints:
      - {x: 1.20, y: -1.65, yaw: 0.0}
      - {x: 3.75, y: 1.10, yaw: 0.0}

  - case_id: pillar_round_002
    scenario_type: corridor
    seed: 2
    waypoint_count: 2
    enable_semantic_regions: true
    mission_waypoints:
      - {x: 1.00, y: -1.65, yaw: 0.0}
      - {x: 3.65, y: -1.15, yaw: 0.0}
